name: PR Plugin Summary

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'

permissions:
  pull-requests: write

jobs:
  summarize:
    name: Summarize Plugin Changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect plugin changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MARKETPLACE=".claude-plugin/marketplace.json"

          # Get marketplace.json at base and head
          OLD_PLUGINS=$(git show "$BASE:$MARKETPLACE" 2>/dev/null | jq -c '.plugins // []' || echo '[]')
          NEW_PLUGINS=$(git show "$HEAD:$MARKETPLACE" 2>/dev/null | jq -c '.plugins // []')

          # Build maps: name -> version
          OLD_MAP=$(echo "$OLD_PLUGINS" | jq -c '[.[] | {key: .name, value: .version}] | from_entries')
          NEW_MAP=$(echo "$NEW_PLUGINS" | jq -c '[.[] | {key: .name, value: .version}] | from_entries')

          OLD_NAMES=$(echo "$OLD_MAP" | jq -r 'keys[]' | sort)
          NEW_NAMES=$(echo "$NEW_MAP" | jq -r 'keys[]' | sort)

          ADDED=$(comm -13 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES"))
          REMOVED=$(comm -23 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES"))
          COMMON=$(comm -12 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES"))

          # Build summary
          SUMMARY=""
          HAS_CHANGES="false"

          if [ -n "$ADDED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### ➕ Added Plugins\n\n"
            SUMMARY+="| Plugin | Version |\n|---|---|\n"
            while IFS= read -r name; do
              ver=$(echo "$NEW_MAP" | jq -r --arg n "$name" '.[$n]')
              SUMMARY+="| \`$name\` | \`$ver\` |\n"
            done <<< "$ADDED"
            SUMMARY+="\n"
          fi

          if [ -n "$REMOVED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### ➖ Removed Plugins\n\n"
            SUMMARY+="| Plugin | Last Version |\n|---|---|\n"
            while IFS= read -r name; do
              ver=$(echo "$OLD_MAP" | jq -r --arg n "$name" '.[$n]')
              SUMMARY+="| \`$name\` | \`$ver\` |\n"
            done <<< "$REMOVED"
            SUMMARY+="\n"
          fi

          # Check for updated versions
          UPDATED=""
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            old_ver=$(echo "$OLD_MAP" | jq -r --arg n "$name" '.[$n]')
            new_ver=$(echo "$NEW_MAP" | jq -r --arg n "$name" '.[$n]')
            if [ "$old_ver" != "$new_ver" ]; then
              UPDATED+="| \`$name\` | \`$old_ver\` → \`$new_ver\` |\n"
            fi
          done <<< "$COMMON"

          if [ -n "$UPDATED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### 🔄 Updated Plugins\n\n"
            SUMMARY+="| Plugin | Version Change |\n|---|---|\n"
            SUMMARY+="$UPDATED\n"
          fi

          # Metadata version change
          OLD_META=$(git show "$BASE:$MARKETPLACE" 2>/dev/null | jq -r '.metadata.version // "unknown"' || echo "unknown")
          NEW_META=$(git show "$HEAD:$MARKETPLACE" 2>/dev/null | jq -r '.metadata.version // "unknown"')
          if [ "$OLD_META" != "$NEW_META" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### 📦 Collection Version\n\n"
            SUMMARY+="\`$OLD_META\` → \`$NEW_META\`\n"
          fi

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<SUMMARY_EOF"
            printf "$SUMMARY"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMENT="## 🔌 Plugin Changes Summary\n\n"
          COMMENT+="${{ steps.changes.outputs.summary }}\n"
          COMMENT+="\n---\n> Generated by [plugin-summary](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) workflow."

          # Delete previous bot comments to avoid duplicates
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Plugin Changes Summary")) | .id' \
            | while read -r id; do
                gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$id"
              done

          printf "$COMMENT" | gh pr comment "${{ github.event.pull_request.number }}" --body-file -
