# Validates plugin version bumps and posts a PR summary of plugin changes.
# Runs on pushes to main and on PRs that touch plugins/ or marketplace.json.
# Plugin versions live only in plugins/<name>/.claude-plugin/plugin.json;
# marketplace.json entries have no version field.
name: Plugin Version Check

on:
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'plugins/**'
      - '.claude-plugin/marketplace.json'

permissions:
  contents: read
  pull-requests: write

jobs:
  check-versions:
    name: "Plugin Version Check — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check plugin versions
        id: check
        run: |
          # For push events, compare against HEAD~1
          # For PR events, compare against base branch
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            BASE_REF="${{ github.event.pull_request.base.sha }}"
          else
            BASE_REF="HEAD~1"
          fi

          ./scripts/check-plugin-versions.sh "$BASE_REF"

      - name: Detect plugin changes for PR comment
        if: github.event_name == 'pull_request'
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          MARKETPLACE=".claude-plugin/marketplace.json"

          # Plugin name sets at base and head (from marketplace.json)
          OLD_NAMES=$(git show "$BASE:$MARKETPLACE" 2>/dev/null | jq -r '.plugins[]?.name' | sort -u || true)
          NEW_NAMES=$(git show "$HEAD:$MARKETPLACE" 2>/dev/null | jq -r '.plugins[]?.name' | sort -u || true)

          ADDED=$(comm -13 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES") || true)
          REMOVED=$(comm -23 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES") || true)
          COMMON=$(comm -12 <(echo "$OLD_NAMES") <(echo "$NEW_NAMES") || true)

          # Resolve a plugin's version from plugin.json at a given ref
          plugin_version() {
            local name="$1" ref="$2"
            git show "${ref}:plugins/${name}/.claude-plugin/plugin.json" 2>/dev/null \
              | jq -r '.version // "unknown"' 2>/dev/null || echo "unknown"
          }

          SUMMARY=""
          HAS_CHANGES="false"

          if [ -n "$ADDED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### ➕ Added Plugins\n\n"
            SUMMARY+="| Plugin | Version |\n|---|---|\n"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              ver=$(plugin_version "$name" "$HEAD")
              SUMMARY+="| \`$name\` | \`$ver\` |\n"
            done <<< "$ADDED"
            SUMMARY+="\n"
          fi

          if [ -n "$REMOVED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### ➖ Removed Plugins\n\n"
            SUMMARY+="| Plugin | Last Version |\n|---|---|\n"
            while IFS= read -r name; do
              [ -z "$name" ] && continue
              ver=$(plugin_version "$name" "$BASE")
              SUMMARY+="| \`$name\` | \`$ver\` |\n"
            done <<< "$REMOVED"
            SUMMARY+="\n"
          fi

          UPDATED=""
          while IFS= read -r name; do
            [ -z "$name" ] && continue
            old_ver=$(plugin_version "$name" "$BASE")
            new_ver=$(plugin_version "$name" "$HEAD")
            if [ "$old_ver" != "$new_ver" ]; then
              UPDATED+="| \`$name\` | \`$old_ver\` → \`$new_ver\` |\n"
            fi
          done <<< "$COMMON"

          if [ -n "$UPDATED" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### 🔄 Updated Plugins\n\n"
            SUMMARY+="| Plugin | Version Change |\n|---|---|\n"
            SUMMARY+="$UPDATED\n"
          fi

          # Metadata version change
          OLD_META=$(git show "$BASE:$MARKETPLACE" 2>/dev/null | jq -r '.metadata.version // "unknown"' || echo "unknown")
          NEW_META=$(git show "$HEAD:$MARKETPLACE" 2>/dev/null | jq -r '.metadata.version // "unknown"')
          if [ "$OLD_META" != "$NEW_META" ]; then
            HAS_CHANGES="true"
            SUMMARY+="### 📦 Marketplace Version\n\n"
            SUMMARY+="\`$OLD_META\` → \`$NEW_META\`\n"
          fi

          echo "has_changes=$HAS_CHANGES" >> "$GITHUB_OUTPUT"
          {
            echo "summary<<SUMMARY_EOF"
            printf "$SUMMARY"
            echo "SUMMARY_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: github.event_name == 'pull_request' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SUMMARY: ${{ steps.changes.outputs.summary }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          # Delete previous bot comments to avoid duplicates
          gh api "repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments" \
            --jq '.[] | select(.user.login == "github-actions[bot]") | select(.body | contains("Plugin Changes Summary")) | .id' \
            | while read -r id; do
                gh api -X DELETE "repos/${{ github.repository }}/issues/comments/$id"
              done

          {
            echo "## 🔌 Plugin Changes Summary"
            echo ""
            printf '%s' "$SUMMARY"
            echo ""
            echo "---"
            echo "> Generated by [check-plugin-versions](${RUN_URL}) workflow."
          } | gh pr comment "${{ github.event.pull_request.number }}" --body-file -
