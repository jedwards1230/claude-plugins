# Validates that marketplace.json and every plugin.json is syntactically valid JSON.
# Runs on every push to main and every PR.
name: CI

run-name: "CI — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: "JSON Validation — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Validate JSON files
        id: validate
        run: |
          {
            echo "## JSON Validation"
            echo ""
            echo "| File | Result |"
            echo "|------|--------|"
          } >> "$GITHUB_STEP_SUMMARY"

          status=0

          validate() {
            local file="$1"
            if python3 -m json.tool "$file" > /dev/null 2>&1; then
              echo "| \`$file\` | :white_check_mark: Valid |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| \`$file\` | :x: Invalid |" >> "$GITHUB_STEP_SUMMARY"
              echo "::error file=$file::Invalid JSON"
              status=1
            fi
          }

          validate .claude-plugin/marketplace.json
          while IFS= read -r -d '' f; do
            validate "$f"
          done < <(find plugins -name plugin.json -print0)

          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ $status -eq 0 ]; then
            echo ":white_check_mark: **All JSON files valid**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo ":x: **Invalid JSON detected** — see errors above" >> "$GITHUB_STEP_SUMMARY"
          fi

          exit $status

  ci:
    name: CI
    if: always()
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          results=("${{ needs.validate.result }}")
          for r in "${results[@]}"; do
            if [[ "$r" == "failure" || "$r" == "cancelled" ]]; then
              echo "CI failed"
              exit 1
            fi
          done
          echo "All checks passed"
